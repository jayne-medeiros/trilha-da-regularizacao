<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin V3 - Trilha</title>
    <link rel="stylesheet" href="../style.css?v=admin2">
    <style>
        body { background-color: #f0f2f5; color: #333; padding: 30px; font-family: 'Inter', sans-serif; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
        .admin-header h2 { margin: 0; font-family: 'Playfair Display', serif; color: var(--color-accent); }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 15px 25px; cursor: pointer; background: transparent; border: none; border-bottom: 3px solid transparent; font-weight: 600; color: #777; transition: all 0.3s; font-size: 1rem;}
        .tab-btn.active { border-bottom-color: var(--color-accent); color: var(--color-accent); }
        
        .form-box { background: #f9fafb; padding: 30px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 40px; display: none; }
        .form-box.active { display: block; }
        .form-box h3 { margin-top: 0; margin-bottom: 25px; color: var(--color-accent); }

        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-col { flex: 1; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; color: #555; }
        .form-group input[type="text"], 
        .form-group textarea,
        .form-group input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Inter', sans-serif; background: white;}
        .form-group input[type="file"] { padding: 10px; }
        .file-hint { font-size: 0.85rem; color: #888; margin-top: 5px; display: block;}

        .btn-save { background: var(--color-accent); color: white; padding: 15px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 700; transition: background 0.3s; width: 100%; }
        .btn-save:hover { background: #333; }
        .btn-cancel { background: transparent; border: 1px solid #ccc; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-right: 10px; font-weight: 600; color: #555; }

        .item-list { margin-top: 40px; }
        .item-card { background: white; border: 1px solid #eee; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .item-info { flex: 1; }
        .item-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; margin-right: 20px; border: 1px solid #eee;}
        .item-actions { display: flex; gap: 10px; }
        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.3s;}
        .btn-edit { background: #e3f2fd; color: #1565c0; }
        .btn-delete { background: #ffebee; color: #c62828; }
        .btn-action:hover { opacity: 0.8; }
        .badge-tipo { display: inline-block; padding: 4px 8px;border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;}
        .badge-trilhas { background: #e8f5e9; color: #2e7d32; }
        .badge-blog { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Painel Administrativo</h2>
            <a href="../index.html" target="_blank" class="btn-link-black">Ver Site <i class="ri-external-link-line"></i></a>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="trilhas">Módulos (Trilhas)</button>
            <button class="tab-btn" data-tab="blog">Blog (Notícias/Materiais)</button>
        </div>

        <input type="hidden" id="edit-index" value="">
        <input type="hidden" id="current-type" value="trilhas">

        <div id="form-trilhas" class="form-box active">
            <h3>Adicionar/Editar Módulo</h3>
            <div class="form-group">
                <label>Título do Módulo</label>
                <input type="text" id="trilha-titulo" placeholder="Ex: Módulo 1 - Legislação">
            </div>
            <div class="form-group">
                <label>Descrição Curta</label>
                <textarea id="trilha-desc" rows="3" placeholder="Breve descrição do conteúdo..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-col form-group">
                    <label>Ícone Padrão (RemixIcon)</label>
                    <input type="text" id="trilha-icon" placeholder="Ex: ri-map-pin-line">
                    <small class="file-hint">Usado se não houver imagem de capa.</small>
                </div>
                <div class="form-col form-group">
                    <label>Link Externo (Opcional)</label>
                    <input type="text" id="trilha-link" placeholder="https://...">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col form-group">
                    <label>Imagem de Capa do Módulo</label>
                    <input type="file" id="trilha-imagem" accept="image/*">
                    <small class="file-hint">Substitui o ícone padrão.</small>
                </div>
                <div class="form-col form-group">
                    <label>Material/Apostila (PDF, DOC, Vídeo)</label>
                    <input type="file" id="trilha-anexo" accept=".pdf,.doc,.docx,.mp4,.zip">
                    <small class="file-hint">Arquivo para download direto.</small>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                <button onclick="limparForm()" class="btn-cancel" style="display: none;" id="btn-cancel-trilha">Cancelar Edição</button>
                <button onclick="salvarItem('trilhas')" class="btn-save">Salvar Módulo</button>
            </div>
        </div>

        <div id="form-blog" class="form-box">
            <h3>Adicionar/Editar Postagem no Blog</h3>
            <div class="form-group">
                <label>Título da Postagem</label>
                <input type="text" id="blog-titulo" placeholder="Título chamativo">
            </div>
            <div class="form-group">
                <label>Resumo/Conteúdo</label>
                <textarea id="blog-resumo" rows="5" placeholder="O texto principal do seu post..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-col form-group" style="flex: 2;">
                     <label>Imagem de Capa (Obrigatório)</label>
                     <input type="file" id="blog-imagem" accept="image/*">
                </div>
            </div>

             <div class="form-row">
                <div class="form-col form-group">
                    <label>Anexo (Documento/Vídeo)</label>
                    <input type="file" id="blog-anexo" accept=".pdf,.doc,.docx,.mp4,.zip">
                </div>
                <div class="form-col form-group">
                    <label>Link Externo</label>
                    <input type="text" id="blog-link-externo" placeholder="https://...">
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                 <button onclick="limparForm()" class="btn-cancel" style="display: none;" id="btn-cancel-blog">Cancelar Edição</button>
                <button onclick="salvarItem('blog')" class="btn-save">Salvar Postagem</button>
            </div>
        </div>

        <hr>

        <h3>Itens Cadastrados</h3>
        <div id="lista-itens" class="item-list">
            <p style="color: #777;">Carregando itens...</p>
        </div>
    </div>

    <script>
        let dadosAtuais = { trilhas: [], blog: [] };
        let abaAtual = 'trilhas';
        let API_KEY = localStorage.getItem('ADMIN_API_KEY') || '';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!API_KEY) {
                API_KEY = prompt('Informe a chave de acesso do admin:') || '';
                if (API_KEY) localStorage.setItem('ADMIN_API_KEY', API_KEY);
            }
            await carregarDados();
            setupTabs();
        });

        async function carregarDados() {
            try {
                const response = await fetch('api.php');
                const data = await response.json();
                if(data) dadosAtuais = data;
                renderizarLista();
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
                document.getElementById('lista-itens').innerHTML = '<p>Erro ao carregar dados.</p>';
            }
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    abaAtual = e.target.dataset.tab;
                    document.getElementById('current-type').value = abaAtual;
                    
                    document.querySelectorAll('.form-box').forEach(box => box.classList.remove('active'));
                    document.getElementById(`form-${abaAtual}`).classList.add('active');

                    limparForm();
                    renderizarLista();
                });
            });
        }

        function renderizarLista() {
            const lista = document.getElementById('lista-itens');
            lista.innerHTML = '';
            const itens = dadosAtuais[abaAtual] || [];

            if (itens.length === 0) {
                lista.innerHTML = '<p style="color: #777;">Nenhum item cadastrado.</p>';
                return;
            }

            itens.forEach((item, index) => {
                let thumbHtml = '';
                let infoHtml = '';

                // Lógica para exibir thumbnail se existir imagem (vale para trilhas e blog agora)
                if(item.imagem) {
                    thumbHtml = `<img src="${item.imagem}" class="item-thumb" alt="Capa">`;
                } else if (abaAtual === 'trilhas' && item.icon) {
                    // Se não tiver imagem, mas for trilha com ícone, mostra ícone
                    thumbHtml = `<div class="item-thumb" style="display:flex;align-items:center;justify-content:center;background:#eee;font-size:24px;"><i class="${item.icon}"></i></div>`;
                }

                if (abaAtual === 'trilhas') {
                    let anexado = item.anexo ? '<br><small style="color:green;">📎 Contém Anexo</small>' : '';
                    infoHtml = `<strong>${item.titulo}</strong><br><small>${item.desc}</small>${anexado}`;
                } else if (abaAtual === 'blog') {
                    infoHtml = `<strong>${item.titulo}</strong><br><small>${item.resumo.substring(0, 60)}...</small>`;
                }

                lista.innerHTML += `
                    <div class="item-card">
                        <div style="display: flex; align-items: center;">
                            ${thumbHtml}
                            <div class="item-info">
                                <span class="badge-tipo badge-${abaAtual}">${abaAtual}</span><br>
                                ${infoHtml}
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-action btn-edit" onclick="editar(${index})"><i class="ri-edit-line"></i> Editar</button>
                            <button class="btn-action btn-delete" onclick="excluir(${index})"><i class="ri-delete-bin-line"></i> Excluir</button>
                        </div>
                    </div>
                `;
            });
        }

        async function salvarItem(tipo) {
            const editIndex = document.getElementById('edit-index').value;
            const formData = new FormData();
            
            formData.append('key', API_KEY);
            formData.append('tipo', tipo);
            formData.append('editIndex', editIndex);

            if (tipo === 'trilhas') {
                const titulo = document.getElementById('trilha-titulo').value;
                if(!titulo) return alert("O título é obrigatório.");
                formData.append('titulo', titulo);
                formData.append('desc', document.getElementById('trilha-desc').value);
                formData.append('icon', document.getElementById('trilha-icon').value);
                formData.append('link', document.getElementById('trilha-link').value);
                
                // Arquivos Trilhas
                const imgFile = document.getElementById('trilha-imagem').files[0];
                const anexoFile = document.getElementById('trilha-anexo').files[0];
                if(imgFile) formData.append('trilha_imagem', imgFile);
                if(anexoFile) formData.append('trilha_anexo', anexoFile);

            } else if (tipo === 'blog') {
                const titulo = document.getElementById('blog-titulo').value;
                if(!titulo) return alert("Título obrigatório.");
                formData.append('titulo', titulo);
                formData.append('resumo', document.getElementById('blog-resumo').value);
                formData.append('link_externo', document.getElementById('blog-link-externo').value);

                // Arquivos Blog
                const imgFile = document.getElementById('blog-imagem').files[0];
                const anexoFile = document.getElementById('blog-anexo').files[0];
                if(imgFile) formData.append('blog_imagem', imgFile);
                if(anexoFile) formData.append('blog_anexo', anexoFile);
            }

            const btnSave = document.querySelector(`#form-${tipo} .btn-save`);
            const originalText = btnSave.innerText;
            btnSave.innerText = 'Salvando...';
            btnSave.disabled = true;

            try {
                const response = await fetch('api.php', { method: 'POST', body: formData });
                const res = await response.json();

                if(res.success) {
                    await carregarDados();
                    limparForm();
                    alert('Item salvo com sucesso!');
                } else {
                    alert('Erro ao salvar: ' + res.error);
                }
            } catch (e) {
                console.error(e);
                alert('Erro de conexão.');
            } finally {
                btnSave.innerText = originalText;
                btnSave.disabled = false;
            }
        }

        function editar(index) {
            const item = dadosAtuais[abaAtual][index];
            document.getElementById('edit-index').value = index;
            document.getElementById(`btn-cancel-${abaAtual}`).style.display = 'inline-block';

            if(abaAtual === 'trilhas') {
                document.getElementById('trilha-titulo').value = item.titulo;
                document.getElementById('trilha-desc').value = item.desc;
                document.getElementById('trilha-icon').value = item.icon;
                document.getElementById('trilha-link').value = item.link || '';
            } else if (abaAtual === 'blog') {
                document.getElementById('blog-titulo').value = item.titulo;
                document.getElementById('blog-resumo').value = item.resumo;
                document.getElementById('blog-link-externo').value = item.link_externo || '';
            }
            alert("Editando... Se não selecionar novos arquivos, os atuais serão mantidos.");
            document.querySelector('.admin-container').scrollIntoView({behavior: 'smooth'});
        }

        // --- NOVA FUNÇÃO EXCLUIR QUE SALVA NO SERVIDOR ---
        async function excluir(index) {
            if(!confirm('Tem certeza que deseja excluir este item? Esta ação é permanente e afetará o site público.')) return;

            const formData = new FormData();
            formData.append('key', API_KEY);
            formData.append('action', 'delete'); // Avisa o PHP que é para deletar
            formData.append('tipo', abaAtual);   // 'trilhas' ou 'blog'
            formData.append('index', index);     // Qual item apagar

            // Muda o texto do botão temporariamente para dar feedback
            // (Opcional, mas bom para UX)
            
            try {
                const response = await fetch('api.php', {
                    method: 'POST',
                    body: formData
                });
                const res = await response.json();

                if(res.success) {
                    alert('Item excluído com sucesso!');
                    await carregarDados(); // Recarrega a lista atualizada do servidor
                } else {
                    alert('Erro ao excluir: ' + res.error);
                }
            } catch (e) {
                console.error(e);
                alert('Erro de conexão ao tentar excluir.');
            }
        }

        function limparForm() {
            document.getElementById('edit-index').value = '';
            
            // Limpa campos Trilhas
            document.getElementById('trilha-titulo').value = '';
            document.getElementById('trilha-desc').value = '';
            document.getElementById('trilha-icon').value = '';
            document.getElementById('trilha-link').value = '';
            document.getElementById('trilha-imagem').value = '';
            document.getElementById('trilha-anexo').value = '';
            document.getElementById('btn-cancel-trilha').style.display = 'none';

            // Limpa campos Blog
            document.getElementById('blog-titulo').value = '';
            document.getElementById('blog-resumo').value = '';
            document.getElementById('blog-link-externo').value = '';
            document.getElementById('blog-imagem').value = '';
            document.getElementById('blog-anexo').value = '';
            document.getElementById('btn-cancel-blog').style.display = 'none';
        }
    </script>
</body>
</html>
